<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DNS Dashboard</title>

  <!--
    Tailwind CSS via CDN
  -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!--
    Google Font — JetBrains Mono
    A monospace font that fits a terminal/security tool aesthetic
    Perfect for displaying IPs, domain names, DNS records
  -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700&display=swap" rel="stylesheet"/>

  <style>
    /* ── CSS Variables ───────────────────────────────────────────
       Define our color palette once here, reuse everywhere
       Dark terminal aesthetic — fits a security/DNS tool perfectly
    ────────────────────────────────────────────────────────────── */
    :root {
      --bg:        #0a0e1a;   /* deep navy background */
      --surface:   #111827;   /* card background */
      --border:    #1f2937;   /* subtle borders */
      --accent:    #00ff88;   /* terminal green accent */
      --accent2:   #00b4ff;   /* blue accent for secondary info */
      --danger:    #ff4444;   /* red for warnings/errors */
      --text:      #e2e8f0;   /* primary text */
      --muted:     #6b7280;   /* secondary/muted text */
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
    }

    /* monospace for DNS data — IPs, records, domain names */
    .mono { font-family: 'JetBrains Mono', monospace; }

    /* ── Animated background grid ────────────────────────────────
       Subtle dot grid pattern gives depth to the background
    ────────────────────────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, #1f2937 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Card style ──────────────────────────────────────────────*/
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      position: relative;
      z-index: 1;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #374151; }

    /* ── Card header accent line ─────────────────────────────────*/
    .card-header {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-header::before {
      content: '';
      width: 3px;
      height: 14px;
      background: var(--accent);
      border-radius: 2px;
    }

    /* ── Search bar ──────────────────────────────────────────────*/
    .search-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 15px;
      padding: 14px 20px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.1);
    }
    .search-input::placeholder { color: var(--muted); }

    /* ── Search button ───────────────────────────────────────────*/
    .search-btn {
      background: var(--accent);
      color: #0a0e1a;
      border: none;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      padding: 14px 28px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .search-btn:hover { opacity: 0.85; }
    .search-btn:active { transform: scale(0.97); }
    .search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Record pill ─────────────────────────────────────────────*/
    .record-pill {
      display: inline-block;
      background: rgba(0, 255, 136, 0.08);
      border: 1px solid rgba(0, 255, 136, 0.2);
      border-radius: 6px;
      padding: 4px 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--accent);
      margin: 3px;
    }

    /* ── Badge ───────────────────────────────────────────────────*/
    .badge-secure {
      background: rgba(0, 255, 136, 0.1);
      border: 1px solid rgba(0, 255, 136, 0.3);
      color: var(--accent);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-insecure {
      background: rgba(255, 68, 68, 0.1);
      border: 1px solid rgba(255, 68, 68, 0.3);
      color: var(--danger);
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 12px;
      font-weight: 600;
    }

    /* ── Key row (DNSSEC keys) ────────────────────────────────────*/
    .key-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.02);
      border-radius: 8px;
      margin-top: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }
    .key-type-ksk {
      color: var(--accent);
      font-weight: 700;
      font-size: 11px;
      background: rgba(0,255,136,0.08);
      padding: 2px 8px;
      border-radius: 4px;
    }
    .key-type-zsk {
      color: var(--accent2);
      font-weight: 700;
      font-size: 11px;
      background: rgba(0,180,255,0.08);
      padding: 2px 8px;
      border-radius: 4px;
    }

    /* ── Resolver row ─────────────────────────────────────────────*/
    .resolver-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .resolver-row:last-child { border-bottom: none; }
    .resolver-name {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    /* ── Loading spinner ─────────────────────────────────────────*/
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Fade in animation ───────────────────────────────────────*/
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeIn 0.4s ease forwards; }

    /* ── Meta info row ───────────────────────────────────────────*/
    .meta-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>

<body>
  <!-- ── Everything sits on top of the dot-grid background ── -->
  <div style="position: relative; z-index: 1;">

    <!-- ── Header ─────────────────────────────────────────────── -->
    <header style="border-bottom: 1px solid var(--border); padding: 20px 0; margin-bottom: 48px;">
      <div style="max-width: 960px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; gap: 12px;">
        <!-- Terminal icon -->
        <div style="width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center;">
          <span style="color: #0a0e1a; font-weight: 700; font-size: 14px; font-family: 'JetBrains Mono', monospace;">&gt;_</span>
        </div>
        <div>
          <div style="font-size: 16px; font-weight: 700; letter-spacing: 0.05em;">ARGUS</div>
          <div style="font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;">DNS Intelligence Dashboard</div>
        </div>
      </div>
    </header>

    <!-- ── Main content ───────────────────────────────────────── -->
    <main style="max-width: 960px; margin: 0 auto; padding: 0 24px 64px;">

      <!-- ── Search section ─────────────────────────────────── -->
      <section style="margin-bottom: 48px;">
        <h1 style="font-size: 32px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.02em;">
          Analyze any domain
        </h1>
        <p style="color: var(--muted); font-size: 14px; margin-bottom: 24px;">
          DNS records · DNSSEC validation · Resolver comparison
        </p>

        <!-- Search bar -->
        <div style="display: flex; gap: 12px;">
          <input
            id="domainInput"
            class="search-input"
            type="text"
            placeholder="google.com"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="searchBtn" class="search-btn" onclick="runScan()">
            Scan
          </button>
        </div>

        <!-- Error message -->
        <div id="errorMsg" style="display:none; color: var(--danger); font-size: 13px; margin-top: 10px;"></div>
      </section>

      <!-- ── Results section (hidden until scan runs) ────────── -->
      <section id="results" style="display: none;">

        <!-- Row 1: DNS Records + DNSSEC -->
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">

          <!-- DNS Records Card -->
          <div class="card fade-in" id="dnsCard">
            <div class="card-header">DNS Records</div>
            <div id="dnsContent"></div>
          </div>

          <!-- DNSSEC Card -->
          <div class="card fade-in" id="dnssecCard" style="animation-delay: 0.1s;">
            <div class="card-header">DNSSEC Status</div>
            <div id="dnssecContent"></div>
          </div>

        </div>

        <!-- Row 2: Resolver Comparison -->
        <div class="card fade-in" id="compareCard" style="animation-delay: 0.2s;">
          <div class="card-header">Resolver Comparison</div>
          <div id="compareContent"></div>
        </div>

      </section>

      <!-- ── Loading state ──────────────────────────────────── -->
      <div id="loading" style="display: none; text-align: center; padding: 48px 0;">
        <div class="spinner" style="margin: 0 auto 16px;"></div>
        <div style="color: var(--muted); font-size: 13px; font-family: 'JetBrains Mono', monospace;">
          Querying DNS...
        </div>
      </div>

    </main>
  </div>

  <script>
    // ── CONSTANTS ────────────────────────────────────────────────
    // Base URL of our Node.js backend API
    // Change this to your backend URL if deploying
    const API = "http://localhost";

    // ── HELPER: show error message ───────────────────────────────
    function showError(msg) {
      const el = document.getElementById("errorMsg");
      el.textContent = msg;
      el.style.display = "block";
    }

    // ── HELPER: hide error message ───────────────────────────────
    function hideError() {
      document.getElementById("errorMsg").style.display = "none";
    }

    // ── HELPER: set loading state ────────────────────────────────
    function setLoading(on) {
      document.getElementById("loading").style.display  = on ? "block" : "none";
      document.getElementById("results").style.display  = on ? "none"  : "block";
      document.getElementById("searchBtn").disabled     = on;
    }

    // ── RENDER: DNS Records card ─────────────────────────────────
    // Takes the API response and builds HTML for the DNS card
    function renderDNS(data) {
      if (data.error) {
        document.getElementById("dnsContent").innerHTML =
          `<p style="color:var(--danger); font-size:13px;">${data.error}</p>`;
        return;
      }

      // records is an array of IP strings e.g. ["142.250.x.x"]
      const records = data.records || [];
      const pills   = records.map(r => `<span class="record-pill">${r}</span>`).join("");

      document.getElementById("dnsContent").innerHTML = `
        <div style="margin-bottom: 12px;">
          <div style="font-size: 11px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em;">
            ${data.record_type} Records
          </div>
          <div>${pills || '<span style="color:var(--muted)">No records found</span>'}</div>
        </div>
        <div class="meta-row">
          <span>TTL: ${data.ttl}s</span>
          <span>${data.response_ms}ms</span>
          <span>${data.nameserver}</span>
        </div>
      `;
    }

    // ── RENDER: DNSSEC card ──────────────────────────────────────
    function renderDNSSEC(data) {
      if (data.error) {
        document.getElementById("dnssecContent").innerHTML =
          `<p style="color:var(--danger); font-size:13px;">${data.error}</p>`;
        return;
      }

      // build key rows if DNSSEC is enabled
      const keyRows = (data.keys || []).map(k => `
        <div class="key-row">
          <span class="${k.type === 'KSK' ? 'key-type-ksk' : 'key-type-zsk'}">${k.type}</span>
          <span style="color: var(--muted)">Algo ${k.algorithm}</span>
          <span style="color: var(--muted)">Flags ${k.flags}</span>
        </div>
      `).join("");

      document.getElementById("dnssecContent").innerHTML = `
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
          <span class="${data.enabled ? 'badge-secure' : 'badge-insecure'}">
            ${data.enabled ? '✓ Enabled' : '✗ Not Enabled'}
          </span>
        </div>
        ${data.enabled ? keyRows : '<p style="color:var(--muted); font-size:13px;">No DNSKEY records found</p>'}
      `;
    }

    // ── RENDER: Resolver Comparison card ────────────────────────
    function renderCompare(data) {
      if (data.error) {
        document.getElementById("compareContent").innerHTML =
          `<p style="color:var(--danger); font-size:13px;">${data.error}</p>`;
        return;
      }

      const results = data.results || {};

      // build a row for each resolver (google, cloudflare)
      const rows = Object.entries(results).map(([name, info]) => {
        const records = info.records
          ? info.records.map(r => `<span class="record-pill">${r}</span>`).join("")
          : `<span style="color:var(--danger)">${info.error}</span>`;

        return `
          <div class="resolver-row">
            <div>
              <div class="resolver-name">${name.toUpperCase()}</div>
              <div>${records}</div>
            </div>
            ${info.response_ms ? `<span style="font-size:12px; color:var(--muted); font-family:'JetBrains Mono',monospace;">${info.response_ms}ms</span>` : ""}
          </div>
        `;
      }).join("");

      // match badge
      const matchBadge = data.match
        ? `<span class="badge-secure">✓ Resolvers Match</span>`
        : `<span class="badge-insecure">✗ Mismatch Detected</span>`;

      document.getElementById("compareContent").innerHTML = `
        <div style="margin-bottom: 16px;">${matchBadge}</div>
        ${rows}
      `;
    }

    // ── MAIN: run the full scan ──────────────────────────────────
    // Called when user clicks "Scan"
    // Fetches all 3 endpoints in parallel using Promise.all
    async function runScan() {
      hideError();

      // get domain from input, trim whitespace
      const domain = document.getElementById("domainInput").value.trim();

      // basic validation
      if (!domain) {
        showError("Please enter a domain name.");
        return;
      }

      // show loading, hide old results
      setLoading(true);

      try {
        // fetch all 3 endpoints in parallel — same pattern as backend's Promise.all
        const [dnsData, dnssecData, compareData] = await Promise.all([
          fetch(`${API}/api/dns/${domain}`).then(r => r.json()),
          fetch(`${API}/api/dnssec/${domain}`).then(r => r.json()),
          fetch(`${API}/api/compare/${domain}`).then(r => r.json()),
        ]);

        // render each card
        renderDNS(dnsData);
        renderDNSSEC(dnssecData);
        renderCompare(compareData);

        // show results
        setLoading(false);

      } catch (err) {
        setLoading(false);
        document.getElementById("results").style.display = "none";
        showError(`Failed to connect to API: ${err.message}`);
      }
    }

    // ── Allow pressing Enter to trigger scan ─────────────────────
    document.getElementById("domainInput").addEventListener("keydown", e => {
      if (e.key === "Enter") runScan();
    });
  </script>
</body>
</html>
