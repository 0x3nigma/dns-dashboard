name: CI

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker images
        run: docker compose build

      - name: Start containers
        run: docker compose up -d

      - name: Test API
        run: |
          sleep 10
          curl -f http://localhost/api/dns/google.com
          curl -f http://localhost/api/dnssec/cloudflare.com
          curl -f http://localhost/api/compare/google.com
          curl -f http://localhost/api/health
